name: Release Desktop

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

env:
  QT_VERSION: 6.8.3
  CMAKE_BUILD_TYPE: Release

jobs:
  meta:
    name: Prepare Release Metadata
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute version and tag
        id: meta
        run: |
          VERSION="$(sed -nE 's/^project\(ImagoRef VERSION ([0-9.]+).*/\1/p' CMakeLists.txt | head -n 1)"
          test -n "$VERSION"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "release_name=ImagoRef ${TAG}" >> "$GITHUB_OUTPUT"

  build-macos:
    name: Build macOS
    needs: meta
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: desktop
          arch: clang_64
          modules: qtwebsockets qt5compat
          cache: true

      - name: Configure project
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} -DCMAKE_OSX_ARCHITECTURES=arm64

      - name: Build package
        run: cmake --build build --config ${{ env.CMAKE_BUILD_TYPE }} --target package

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: build/ImagoRef_v*_macOS.pkg
          if-no-files-found: error

  build-windows:
    name: Build Windows
    needs: meta
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: desktop
          arch: win64_msvc2022_64
          modules: qtwebsockets qt5compat
          cache: true

      - name: Install Zlib
        shell: pwsh
        run: vcpkg install zlib:x64-windows

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis --no-progress -y

      - name: Configure project
        shell: pwsh
        run: |
          $toolchain = Join-Path $env:VCPKG_INSTALLATION_ROOT "scripts\buildsystems\vcpkg.cmake"
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} `
            -DCMAKE_TOOLCHAIN_FILE="$toolchain" `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}\install"

      - name: Build and install
        shell: pwsh
        run: cmake --build build --config ${{ env.CMAKE_BUILD_TYPE }} --target INSTALL

      - name: Deploy Qt runtime
        shell: pwsh
        run: |
          & "${env:QT_ROOT_DIR}\bin\windeployqt.exe" `
            --no-opengl-sw `
            --no-translations `
            --qmldir "${{ github.workspace }}\src\qml" `
            --verbose 1 `
            "${{ github.workspace }}\install\bin\ImagoRef.exe"

      - name: Deploy additional runtime DLLs
        shell: pwsh
        run: |
          $bin = "${{ github.workspace }}\install\bin"
          $searchRoots = @(
            "${env:QT_ROOT_DIR}\bin",
            "${env:VCPKG_INSTALLATION_ROOT}\installed\x64-windows\bin"
          )

          $requiredDlls = @(
            "Qt6Core5Compat.dll"
          )

          foreach ($dll in $requiredDlls) {
            $source = $null
            foreach ($root in $searchRoots) {
              $candidate = Join-Path $root $dll
              if (Test-Path $candidate) {
                $source = $candidate
                break
              }
            }

            if ($source) {
              Copy-Item $source $bin -Force
              Write-Host "Copied $dll from $source"
            } else {
              Write-Error "Required runtime DLL was not found: $dll"
              exit 1
            }
          }

          $zlib = $null
          foreach ($dll in @("z.dll", "zlib1.dll")) {
            foreach ($root in $searchRoots) {
              $candidate = Join-Path $root $dll
              if (Test-Path $candidate) {
                $zlib = $candidate
                break
              }
            }
            if ($zlib) { break }
          }

          if (-not $zlib) {
            Write-Error "Required zlib runtime DLL was not found"
            exit 1
          }

          Copy-Item $zlib (Join-Path $bin (Split-Path $zlib -Leaf)) -Force
          Copy-Item $zlib (Join-Path $bin "z.dll") -Force
          Write-Host "Copied zlib runtime from $zlib"

          Get-ChildItem $bin -Filter *.dll | Sort-Object Name | ForEach-Object { $_.Name }

      - name: Deploy app resources
        shell: pwsh
        run: |
          $bin = "${{ github.workspace }}\install\bin"

          foreach ($pluginDir in @("imageformats", "iconengines")) {
            $source = Join-Path $env:QT_ROOT_DIR "plugins\$pluginDir"
            if (-not (Test-Path $source)) {
              Write-Error "Required Qt plugin directory was not found: $source"
              exit 1
            }
            Copy-Item $source $bin -Recurse -Force
          }

          $themes = Join-Path $bin "themes"
          Remove-Item $themes -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item "${{ github.workspace }}\res\themes" $themes -Recurse -Force

          $requiredFiles = @(
            (Join-Path $themes "imago\theme.json"),
            (Join-Path $themes "imago\WelcomeWindow\background\logo.svg"),
            (Join-Path $themes "imago\MainWindow\tools\paste.svg"),
            (Join-Path $bin "imageformats\qsvg.dll")
          )

          foreach ($path in $requiredFiles) {
            if (-not (Test-Path $path)) {
              Write-Error "Missing packaged resource: $path"
              exit 1
            }
          }

          $themeFileCount = (Get-ChildItem $themes -Recurse -File | Measure-Object).Count
          Write-Host "Packaged theme files: $themeFileCount"

      - name: Build installer
        shell: pwsh
        run: |
          cmake --build build --config ${{ env.CMAKE_BUILD_TYPE }} --target PACKAGE
          if ($LASTEXITCODE -ne 0) {
            Get-Content "build\_CPack_Packages\win64\NSIS\NSISOutput.log" -ErrorAction SilentlyContinue
            exit $LASTEXITCODE
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: build/ImagoRef_v*_windows.exe
          if-no-files-found: error

  build-linux:
    name: Build Linux
    needs: meta
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1-mesa-dev patchelf fakeroot libfuse2 libxcb-cursor0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: desktop
          arch: linux_gcc_64
          modules: qtwebsockets qt5compat
          cache: true

      - name: Download linuxdeployqt
        run: |
          wget -nv https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage -O linuxdeployqt
          chmod +x linuxdeployqt

      - name: Configure project
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build project
        run: cmake --build build --parallel 2

      - name: Install into AppDir
        run: cmake --install build --prefix AppDir/usr

      - name: Build AppImage
        run: |
          cp AppDir/usr/share/applications/ImagoRef.desktop AppDir/
          cp AppDir/usr/share/icons/hicolor/256x256/apps/ImagoRef.png AppDir/
          rm -rf AppDir/usr/bin/themes
          cp -a res/themes AppDir/usr/bin/themes
          test -f AppDir/usr/bin/themes/imago/theme.json
          test -f AppDir/usr/bin/themes/imago/WelcomeWindow/background/logo.svg
          test -f AppDir/usr/bin/themes/imago/MainWindow/tools/paste.svg
          find "$QT_PLUGIN_PATH/sqldrivers" -type f ! -name 'libqsqlite.so' -delete
          export LD_LIBRARY_PATH="$PWD/AppDir/usr/lib/x86_64-linux-gnu:${LD_LIBRARY_PATH:-}"
          ./linuxdeployqt ./AppDir/usr/bin/ImagoRef -appimage -qmldir=src/qml -extra-plugins=iconengines,imageformats
          mv ./*.AppImage "ImagoRef_v${{ needs.meta.outputs.version }}_linux.AppImage"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: ImagoRef_v*_linux.AppImage
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - meta
      - build-macos
      - build-windows
      - build-linux
    runs-on: ubuntu-22.04
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.meta.outputs.tag }}
          RELEASE_NAME: ${{ needs.meta.outputs.release_name }}
        run: |
          mapfile -t files < <(find dist -type f | sort)
          test "${#files[@]}" -gt 0
          gh release create "$TAG" "${files[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_NAME" \
            --generate-notes
